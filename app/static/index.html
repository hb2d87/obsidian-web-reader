<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Web Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <button id="sidebar-toggle" class="header-button" aria-label="Toggle sidebar">
                <span class="menu-icon">&#9776;</span>
            </button>
            <h1 class="app-title">OBSIDIAN READER</h1>
            <div id="vault-name" class="vault-name">Loading...</div>
        </header>

        <!-- Mobile Overlay -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar -->
            <aside id="sidebar" class="sidebar">
                <button id="sidebar-close" class="sidebar-close" aria-label="Close sidebar">
                    <span class="close-icon">&#215;</span>
                </button>
                <div class="sidebar-content">
                    <div class="search-container">
                        <input type="text" id="search-input" placeholder="Search files..." class="search-input">
                        <div id="search-results-overlay" class="search-results-overlay"></div>
                    </div>
                    <div id="file-tree" class="file-tree"></div>
                </div>
                <div id="search-dismiss-layer" class="search-dismiss-layer"></div>
                <div id="sidebar-resizer" class="sidebar-resizer">
                    <div class="resizer-handle"></div>
                </div>
            </aside>

            <!-- Editor Area -->
            <main class="editor-area">
                <div class="editor-header">
                    <div id="current-file" class="current-file">No file selected</div>
                    <div id="save-status" class="save-status"></div>
                    <button id="preview-toggle" class="preview-toggle" aria-label="Toggle preview">PREV</button>
                </div>
                <div class="editor-body">
                    <div class="editor-container">
                        <div class="editor-prompt">&gt; </div>
                        <textarea id="editor" class="editor" placeholder="Select a file to edit..." spellcheck="false"></textarea>
                    </div>
                    <div id="preview-pane" class="preview-pane hidden"></div>
                </div>
                <div class="editor-container">
                    <div class="editor-prompt">&gt; </div>
                    <textarea id="editor" class="editor" placeholder="Select a file to edit..." spellcheck="false"></textarea>
                </div>
            </main>
        </div>

        <!-- Status Bar -->
        <footer class="status-bar">
            <span class="terminal-prompt">$</span>
            <span class="terminal-command">cat</span>
            <span id="status-text" class="status-text"> Ready</span>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
